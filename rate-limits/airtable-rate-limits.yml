specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Airtable
providerId: airtable
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Database
description: 'Airtable API: 5 req/sec per base.'
sources:
  - https://www.airtable.com/pricing
  - https://airtable.com/developers/web/api/rate-limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: REST API
    scope: base
    metric: requests_per_second
    limit: 5
    timeFrame: second
    notes: Per base. After 429, must wait 30s.
  - name: Records per request (write)
    scope: request
    metric: records
    limit: 10
    timeFrame: request
  - name: Records per request (read)
    scope: request
    metric: records
    limit: 100
    timeFrame: request
