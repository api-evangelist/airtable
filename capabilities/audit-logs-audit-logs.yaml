      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: audit-logs-audit-logs.listauditlogrequests
      outputParameters:
      - type: object
        mapping: $.
    - name: airtable-create-audit-log-export
      description: Airtable Create an Audit Log Export Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: audit-logs-audit-logs.createauditlogrequest
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: airtable-get-audit-log-export
      description: Airtable Get an Audit Log Export Request
