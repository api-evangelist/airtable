naftiko: "1.0.0-alpha1"

info:
  label: "Airtable Metadata API"
  description: "Airtable Metadata API for managing bases, tables, and fields programmatically."
  tags:
    - Airtable
    - Metadata
    - Schema
    - Database
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AIRTABLE_API_TOKEN: AIRTABLE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: airtable-meta
      baseUri: https://api.airtable.com/v0/meta
      description: "Airtable Metadata API for base and schema management."
      authentication:
        type: bearer
        token: "{{AIRTABLE_API_TOKEN}}"
      resources:
        - name: bases
          path: /bases
          description: "Manage Airtable bases."
          operations:
            - name: list-bases
              method: GET
              description: "List all bases the user has access to."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-base-schema
              method: GET
              description: "Get the schema of a base including tables and fields."
              inputParameters:
                - name: baseId
                  in: path
                  type: string
                  required: true
                  description: "Base ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: airtable-meta-rest
      resources:
        - path: /v1/bases
          name: bases
          description: "Airtable bases."
          operations:
            - method: GET
              name: list-bases
              description: "List bases."
              call: "airtable-meta.list-bases"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: airtable-meta-mcp
      transport: http
      tools:
        - name: list-bases
          description: "List all Airtable bases accessible to the user."
          hints:
            readOnly: true
            openWorld: true
          call: "airtable-meta.list-bases"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-base-schema
          description: "Get the schema of an Airtable base including all tables and fields."
          hints:
            readOnly: true
          call: "airtable-meta.get-base-schema"
          outputParameters:
            - type: object
              mapping: "$."
