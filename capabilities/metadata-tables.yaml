naftiko: 1.0.0-alpha2
info:
  label: Airtable Metadata API — Tables
  description: 'Airtable Metadata API — Tables. 2 operations. Lead operation: Airtable Create a Table in a Base. Self-contained
    Naftiko capability covering one Airtable business surface.'
  tags:
  - Airtable
  - Tables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AIRTABLE_API_KEY: AIRTABLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: metadata-tables
    baseUri: https://api.airtable.com/v0
    description: Airtable Metadata API — Tables business capability. Self-contained, no shared references.
    resources:
    - name: meta-bases-baseId-tables
      path: /meta/bases/{baseId}/tables
      operations:
      - name: createtable
        method: POST
        description: Airtable Create a Table in a Base
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: meta-bases-baseId-tables-tableId
      path: /meta/bases/{baseId}/tables/{tableId}
      operations:
      - name: updatetable
        method: PATCH
        description: Airtable Update a Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AIRTABLE_API_KEY}}'
  exposes:
  - type: rest
    namespace: metadata-tables-rest
    port: 8080
    description: REST adapter for Airtable Metadata API — Tables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/meta/bases/{baseid}/tables
      name: meta-bases-baseid-tables
      description: REST surface for meta-bases-baseId-tables.
      operations:
      - method: POST
        name: createtable
        description: Airtable Create a Table in a Base
        call: metadata-tables.createtable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meta/bases/{baseid}/tables/{tableid}
      name: meta-bases-baseid-tables-tableid
      description: REST surface for meta-bases-baseId-tables-tableId.
      operations:
      - method: PATCH
        name: updatetable
        description: Airtable Update a Table
        call: metadata-tables.updatetable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metadata-tables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Airtable Metadata API — Tables. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: airtable-create-table-base
      description: Airtable Create a Table in a Base
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metadata-tables.createtable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: airtable-update-table
      description: Airtable Update a Table
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: metadata-tables.updatetable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
