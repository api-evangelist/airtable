      path: /Users
      operations:
      - name: listscimusers
        method: GET
        description: Airtable List SCIM Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: SCIM filter expression (e.g., userName eq "user@example.com"). Supports eq operator on userName.
        - name: startIndex
          in: query
          type: integer
          description: The 1-based index of the first result to return.
        - name: count
          in: query
          type: integer
          description: The maximum number of results to return per page.
      - name: createscimuser
