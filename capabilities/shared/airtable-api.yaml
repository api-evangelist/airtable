naftiko: "1.0.0-alpha1"

info:
  label: "Airtable API"
  description: "Core Airtable API for managing records, comments, and webhooks in Airtable bases."
  tags:
    - Airtable
    - Database
    - Low-Code
    - No-Code
    - Collaboration
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AIRTABLE_API_TOKEN: AIRTABLE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: airtable
      baseUri: https://api.airtable.com/v0
      description: "Airtable REST API for records management."
      authentication:
        type: bearer
        token: "{{AIRTABLE_API_TOKEN}}"
      resources:
        - name: records
          path: /{baseId}/{tableIdOrName}
          description: "Create, read, update, and delete records in Airtable tables."
          operations:
            - name: list-records
              method: GET
              description: "List records from a table."
              inputParameters:
                - name: baseId
                  in: path
                  type: string
                  required: true
                  description: "Airtable base ID."
                - name: tableIdOrName
                  in: path
                  type: string
                  required: true
                  description: "Table ID or name."
                - name: maxRecords
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of records to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-records
              method: POST
              description: "Create one or more records in a table."
              inputParameters:
                - name: baseId
                  in: path
                  type: string
                  required: true
                  description: "Airtable base ID."
                - name: tableIdOrName
                  in: path
                  type: string
                  required: true
                  description: "Table ID or name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  records: "{{tools.records}}"
            - name: update-record
              method: PATCH
              description: "Update fields of a record."
              inputParameters:
                - name: baseId
                  in: path
                  type: string
                  required: true
                  description: "Airtable base ID."
                - name: tableIdOrName
                  in: path
                  type: string
                  required: true
                  description: "Table ID or name."
                - name: recordId
                  in: path
                  type: string
                  required: true
                  description: "Record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  fields: "{{tools.fields}}"
            - name: delete-record
              method: DELETE
              description: "Delete a record from a table."
              inputParameters:
                - name: baseId
                  in: path
                  type: string
                  required: true
                  description: "Airtable base ID."
                - name: tableIdOrName
                  in: path
                  type: string
                  required: true
                  description: "Table ID or name."
                - name: recordId
                  in: path
                  type: string
                  required: true
                  description: "Record ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: airtable-rest
      resources:
        - path: /v1/records
          name: records
          description: "Airtable records."
          operations:
            - method: GET
              name: list-records
              description: "List records."
              call: "airtable.list-records"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-records
              description: "Create records."
              call: "airtable.create-records"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: airtable-mcp
      transport: http
      tools:
        - name: list-records
          description: "List records from an Airtable table."
          hints:
            readOnly: true
            openWorld: true
          call: "airtable.list-records"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-records
          description: "Create one or more records in an Airtable table."
          hints:
            readOnly: false
          call: "airtable.create-records"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-record
          description: "Update fields in an Airtable record."
          hints:
            readOnly: false
            idempotent: false
          call: "airtable.update-record"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-record
          description: "Delete an Airtable record."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "airtable.delete-record"
          outputParameters:
            - type: object
              mapping: "$."
